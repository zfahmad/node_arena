    seed: 0
    gamma: 1.0
    tree_policy:
      type_: "ucb1"
      C: 1.0
    final_policy:
      type_: "lcb"
    eval_func:
      type_: "random_rollout"

inference_servers: [{
    name: "s1",
    type_: "puct",
    ckpt_dir: "",
    batch_size: 32,
    model_cfg: {
        name: "ResNet",
        hypers: {
            dims: [4,4,3],
            num_blocks: 4
        }
    }
  }]
