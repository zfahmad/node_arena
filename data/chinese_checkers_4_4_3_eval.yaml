  params:
    seed: 0
    num_samples: 64
    gamma: 1.0
    exploitation_threshold: 1
    training: False
    dirichlet_epsilon: 0.2
    dirichlet_alpha: 0.1
    tree_policy:
      seed:
      C: 1.0
    final_policy:
      seed:

